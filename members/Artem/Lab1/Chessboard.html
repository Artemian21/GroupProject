<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Шахова дошка - Позиція</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">Командний проєкт</div>
        <nav class="nav">
            <a href="../../../index.html">Головна</a>
        </nav>
    </header>

    <main class="container">
        <div class="lab-content chess-page">
<h2 class="text-center">Ларсен – Найдорф, в 1968 році (міттельшпіль).</h2>

        <table id="chess" class="chess-table theme-classic">
            <tr>
                <th></th>
                <th>A</th>
                <th>B</th>
                <th>C</th>
                <th>D</th>
                <th>E</th>
                <th>F</th>
                <th>G</th>
                <th>H</th>
            </tr>
            <tr>
                <th>8</th>
                <td class="cell-light"></td>
                <td class="cell-dark piece-dark">♜</td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light piece-dark">♚</td>
                <td class="cell-dark"></td>
            </tr>
            <tr>
                <th>7</th>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light piece-dark">♛</td>
                <td class="cell-dark piece-dark">♟</td>
                <td class="cell-light"></td>
            </tr>
            <tr>
                <th>6</th>
                <td class="cell-light piece-dark">♟</td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light piece-dark">♟</td>
                <td class="cell-dark piece-dark">♞</td>
                <td class="cell-light"></td>
                <td class="cell-dark piece-dark">♟</td>
            </tr>
            <tr>
                <th>5</th>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark piece-light">♖</td>
                <td class="cell-light piece-dark">♟</td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
            </tr>
            <tr>
                <th>4</th>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light piece-dark">♟</td>
                <td class="cell-dark piece-light">♙</td>
                <td class="cell-light piece-light">♙</td>
                <td class="cell-dark piece-light">♙</td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
            </tr>
            <tr>
                <th>3</th>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark piece-light">♙</td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light piece-light">♙</td>
            </tr>
            <tr>
                <th>2</th>
                <td class="cell-light piece-dark">♜</td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark piece-light">♘</td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light piece-light">♙</td>
                <td class="cell-dark"></td>
            </tr>
            <tr>
                <th>1</th>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark piece-light">♕</td>
                <td class="cell-light"></td>
                <td class="cell-dark"></td>
                <td class="cell-light"></td>
                <td class="cell-dark piece-light">♖</td>
                <td class="cell-light piece-light">♔</td>
            </tr>
        </table>
        
        <script src="chess.js"></script>
        </div>
    </main>

</html>
