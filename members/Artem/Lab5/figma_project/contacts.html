<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HolidayTime — Контакти</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="contacts.css">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="header__logo">
      <img src="images/logo.png" alt="HolidayTime">
    </div>
    <nav class="header__nav">
      <a href="index.html" class="nav__link">ГОЛОВНА</a>
      <span class="nav__divider">|</span>
      <a href="about_us.html" class="nav__link">ПРО НАС</a>
      <span class="nav__divider">|</span>
      <a href="booking.html" class="nav__link">ЗАБРОНЮВАТИ</a>
      <span class="nav__divider">|</span>
      <a href="contacts.html" class="nav__link nav__link--active">КОНТАКТИ</a>
      <span class="nav__divider">|</span>
      <a href="account.html" class="nav__link">ОСОБИСТИЙ КАБІНЕТ</a>
      <span class="nav__divider">|</span>
      <div class="nav__lang">
        <img src="images/globe.svg" alt="Мова">

        <select class="nav__lang-select">
          <option value="ua">UA</option>
          <option value="fr">FR</option>
          <option value="en">EN</option>
        </select>
      </div>
    </nav>
  </header>

  <!-- Заголовок сторінки -->
  <section class="page-title-bar">
    <h1 class="page-title-bar__title"><em>Контакти</em></h1>
  </section>

  <!-- Основний контент -->
  <main class="contacts-page">

    <!-- Контактна інформація -->
    <section class="contacts-info">

      <!-- Контактний рядок -->
      <div class="contacts-row">

        <div class="contact-item">
          <h3 class="contact-item__label">Телефон</h3>
          <p class="contact-item__value">+38(097)119-89-83</p>
        </div>

        <div class="contact-item">
          <h3 class="contact-item__label">Графік роботи</h3>
          <p class="contact-item__value">пн-пт 08:00-22:00</p>
          <p class="contact-item__value">сб 09:00-21:00</p>
          <p class="contact-item__value">вс 10:00-20:00</p>
        </div>

        <div class="contact-item">
          <h3 class="contact-item__label">Ел. пошта</h3>
          <p class="contact-item__value">hello@gmail.com</p>
        </div>

      </div>

      <!-- Адреса та карта -->
      <div class="contacts-address-row">

        <div class="contact-item">
          <h3 class="contact-item__label">Адреса офісу</h3>
          <p class="contact-item__value">м. Київ, вул. Малевича, буд. 4</p>
        </div>

        <div class="contacts-map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2541.081244687947!2d30.43158772609718!3d50.43958733814643!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40d4cc196105bc51%3A0xe13c3cadc2638a31!2z0JPRg9GA0YLQvtC20LjRgtC-0Log4oSWMyDQndCQ0KM!5e0!3m2!1suk!2sua!4v1778178130683!5m2!1suk!2sua"
            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

      </div>

    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer__copy">© 2021 HolidayTime. All rights reserved.</p>
  </footer>

</body>

</html>
