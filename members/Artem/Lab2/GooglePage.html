<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Google - Артем</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">Командний проєкт</div>
        <nav class="nav">
            <a href="../../../index.html">Головна</a>
        </nav>
    </header>

    <main class="container">
        <div class="lab-content google-page">
<div class="google-topbar">
            <a href="?page=gmail" class="g-link">Gmail</a>
            <a href="?page=images" class="g-link">Зображення</a>
            <a href="?page=menu" class="g-link google-apps-icon">⋮⋮⋮</a>
            <a href="?page=login" class="btn-login">Увійти</a>
        </div>

        <div class="google-center">
            
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google" class="google-logo-image">
            
            <form action="?search=google" method="get" class="google-search-form">
                <input type="text" name="q" placeholder="Пошук у Google або введіть URL">
                
                <div class="google-actions">
                    <input type="submit" value="Пошук Google">
                    <input type="submit" value="Мені пощастить" formaction="?search=lucky">
                </div>
            </form>
        </div>

        <footer class="footer-box">
            <div class="google-footer-country">
                Україна
            </div>
            <div class="google-footer-links">
                <a href="?page=about" class="g-link">Про компанію</a>
                <a href="?page=ads" class="g-link">Реклама</a>
                <a href="?page=business" class="g-link">Бізнес</a>
                <a href="?page=privacy" class="g-link">Конфіденційність</a>
                <a href="?page=terms" class="g-link">Умови</a>
            </div>
        </footer>
        </div>
    </main>
</body>
</html>
