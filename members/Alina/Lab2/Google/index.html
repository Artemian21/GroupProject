<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Аліна</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../../../../css/style.css">
</head>
<body>
    <div id="header-placeholder" data-root="../../../../"></div>

    <main class="container google-page">
        
        <div style="display: flex; justify-content: flex-end; align-items: center; padding: 15px 20px;">
            <a href="#" class="g-link">Gmail</a>
            <a href="#" class="g-link">Зображення</a>
            <a href="#" class="g-link" style="display: flex; align-items: center;">
                <span class="material-symbols-outlined">apps</span>
            </a>
            <a href="#" class="btn-login">Увійти</a>
        </div>

        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            
            <h1 style="font-size: 5.5rem; margin-bottom: 20px; font-family: 'Product Sans', Arial, sans-serif; font-weight: 500; letter-spacing: -3px;">
                <span style="color: #4285F4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span>
            </h1>
            
            <div style="position: relative; width: 100%; max-width: 580px;">
                <span class="material-symbols-outlined" style="position: absolute; left: 15px; top: 12px; color: #9aa0a6;">search</span>
                
                <input type="text" name="q" placeholder="Введіть запит..." style="padding-left: 45px; padding-right: 100px;">
                
                <div style="position: absolute; right: 15px; top: 12px; color: #70757a; display: flex; gap: 10px;">
                    <span class="material-symbols-outlined" style="cursor: pointer;">keyboard</span>
                    <span class="material-symbols-outlined" style="cursor: pointer;">mic</span>
                    <span class="material-symbols-outlined" style="cursor: pointer;">image_search</span>
                </div>
            </div>

            <div style="margin-top: 25px; text-align: center;">
                <input type="button" value="Пошук Google">
                <input type="button" value="Мені пощастить!">
            </div>
        </div>

        <footer class="footer-box">
            <div style="padding: 15px 30px; border-bottom: 1px solid #dadce0; color: #70757a; font-size: 15px;">
                Україна
            </div>
            <div style="display: flex; justify-content: space-between; flex-wrap: wrap; padding: 15px 30px;">
                <div>
                    <a href="#" class="g-link">Про Google</a>
                    <a href="#" class="g-link">Реклама</a>
                    <a href="#" class="g-link">Бізнес</a>
                    <a href="#" class="g-link">Як працює Пошук</a>
                </div>
                <div>
                    <a href="#" class="g-link">Конфіденційність</a>
                    <a href="#" class="g-link">Умови</a>
                    <a href="#" class="g-link">Налаштування</a>
                </div>
            </div>
        </footer>
    </main>

    <script src="../../../../header.js"></script>
</body>
</html>
