<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Аліна</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../../../../css/style.css">
</head>
<body>
<header class="header">
    <div class="logo">Командний проєкт</div>
    <nav class="nav">
        <a href="../../../../index.html">Головна</a>
    </nav>
</header>
<main class="container google-page" id="container">

    <div class="google-topbar">
        <a href="#" class="g-link">Gmail</a>
        <a href="#" class="g-link">Зображення</a>
        <a href="#" class="g-link google-apps-link">
            <span class="material-symbols-outlined">apps</span>
        </a>
        <a href="#" class="btn-login">Увійти</a>
    </div>

    <div class="google-center">

        <h1 class="google-logo-text">
            <span class="google-blue">G</span><span class="google-red">o</span><span class="google-yellow">o</span><span class="google-blue">g</span><span class="google-green">l</span><span class="google-red">e</span>
        </h1>

        <div class="google-search-form">
            <span class="material-symbols-outlined google-search-icon">search</span>

            <input type="text" name="q" placeholder="Введіть запит..." class="google-search-input">

            <div class="google-search-actions">
                <span class="material-symbols-outlined">keyboard</span>
                <span class="material-symbols-outlined">mic</span>
                <span class="material-symbols-outlined">image_search</span>
            </div>
        </div>

        <div class="google-actions">
            <input type="button" value="Пошук Google">
            <input type="button" value="Мені пощастить!">
        </div>
    </div>

    <footer class="footer-box">
        <div class="google-footer-country">Україна</div>
        <div class="google-footer-links">
            <div>
                <a href="#" class="g-link">Про Google</a>
                <a href="#" class="g-link">Реклама</a>
                <a href="#" class="g-link">Бізнес</a>
                <a href="#" class="g-link">Як працює Пошук</a>
            </div>
            <div>
                <a href="#" class="g-link">Конфіденційність</a>
                <a href="#" class="g-link">Умови</a>
                <a href="#" class="g-link">Налаштування</a>
            </div>
        </div>
    </footer>
</main>
</body>
</html>
