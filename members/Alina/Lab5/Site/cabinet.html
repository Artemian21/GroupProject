<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особистий кабінет</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cabinet.css">
</head>
<body id="top">

    <div id="header-placeholder"></div>

    <div class="page-title-wrapper">
        <div class="container">
            <h1 class="page-title">Особистий кабінет</h1>
        </div>
    </div>

    <main class="container">

        <div class="cabinet-card">

            <div class="cabinet-avatar-section">
                <div class="avatar-circle">
                    <span class="material-symbols-outlined">person</span>
                </div>
                <button class="btn-avatar" type="button">Змінити аватар</button>
                <button class="btn-settings" type="button">Налаштування</button>
            </div>

            <div class="cabinet-info">
                <div class="cabinet-info-row">Петров Іван Іванович</div>
                <div class="cabinet-info-row">
                    <span class="label">Стать:</span>
                    <span class="value"> чоловіча</span>
                </div>
                <div class="cabinet-info-row">
                    <span class="label">Дата народження:</span>
                    <span class="value"> 10. 02. 1998</span>
                </div>
                <div class="cabinet-info-row">
                    <span class="label">Мобільний телефон:</span>
                    <span class="value"> +38(097)346-72-50</span>
                </div>
                <div class="cabinet-info-row">
                    <span class="label">Ел. пошта:</span>
                    <span class="value"> petrov@gmail.com</span>
                </div>
            </div>

        </div>

        <div class="cabinet-logout">
            <a href="index.html" class="btn-logout" type="button">Вийти</a>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
</body>
</html>
