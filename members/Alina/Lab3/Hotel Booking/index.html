<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel Booking - Аліна</title>
  <link rel="stylesheet" href="../../../../css/style.css">
</head>
<body>
  <div id="header-placeholder" data-root="../../../../"></div>

  <main class="container">
    
    <div class="gallery gallery-sm mb-20">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=120&h=80&fit=crop" alt="Hotel room 1">
      <img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=120&h=80&fit=crop" alt="Hotel room 2">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=120&h=80&fit=crop" alt="Sea view">
    </div>

    <h1 class="text-center">Hotel Booking</h1>
    <p class="text-center text-muted mt-n15"><i>Special discounts for "Програмування для Інтернет" students</i></p>

    <hr/>

    <form class="booking-form">
      
      <div class="form-row">
        <div>
          <label>Name <span class="text-danger">*</span></label>
          <div class="form-flex">
            <div class="form-flex-1">
              <input type="text" id="firstName" name="firstName" placeholder="First Name" required class="mb-4">
              <small class="text-muted">First Name</small>
            </div>
            <div class="form-flex-1">
              <input type="text" id="lastName" name="lastName" placeholder="Last Name" required class="mb-4">
              <small class="text-muted">Last Name</small>
            </div>
          </div>
        </div>

        <div>
          <label for="email">E-mail <span class="text-danger">*</span></label>
          <input type="email" id="email" name="email" placeholder="ex: myname@example.com" required class="mb-4">
          <small class="text-muted">example@example.com</small>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="roomType">Room Type</label>
          <select id="roomType" name="roomType">
            <option value="">Please Select</option>
            <option value="single">Single</option>
            <option value="double">Double</option>
            <option value="suite">Suite</option>
            <option value="deluxe">Deluxe</option>
          </select>
        </div>

        <div>
          <label for="guests">Number of Guests <span class="text-danger">*</span></label>
          <input type="number" id="guests" name="guests" placeholder="e.g., 4" min="1" max="10" required class="mb-4">
          <small class="text-muted">(min 1, max 10)</small>
        </div>
      </div>

      <div class="mb-20">
        <label>Arrival Date &amp; Time <span class="text-danger">*</span></label>
        <div class="form-flex">
          <div class="form-flex-2">
            <input type="date" id="arrivalDate" name="arrivalDate" value="2026-03-21" required class="mb-0">
          </div>
          <div class="form-flex form-flex-2">
            <div class="form-flex-1">
              <input type="number" id="arrHour" name="arrHour" placeholder="12" min="0" max="23" class="mb-4">
              <small class="text-muted">Hour</small>
            </div>
            <div class="form-flex-1">
              <input type="number" id="arrMinute" name="arrMinute" placeholder="40" min="0" max="59" class="mb-4">
              <small class="text-muted">Minutes</small>
            </div>
            <div class="form-flex-1">
              <select id="ampm" name="ampm" class="mb-20">
                <option value="AM">AM</option>
                <option value="PM" selected>PM</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-20">
        <label>Departure Date <span class="text-danger">*</span></label>
        <div class="form-flex">
          <div class="form-flex-1">
            <select id="depMonth" name="depMonth" required class="mb-4">
              <option value="">Select a month</option>
              <option value="01">January</option><option value="02">February</option><option value="03">March</option>
            </select>
            <small class="text-muted">Month</small>
          </div>
          <div class="form-flex-1">
            <select id="depDay" name="depDay" required class="mb-4">
              <option value="">Select a day</option>
              <option value="1">1</option><option value="15">15</option><option value="25">25</option>
            </select>
            <small class="text-muted">Day</small>
          </div>
          <div class="form-flex-1">
            <select id="depYear" name="depYear" required class="mb-4">
              <option value="">Select a year</option>
              <option value="2026">2026</option><option value="2027">2027</option>
            </select>
            <small class="text-muted">Year</small>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Free Pickup? <span class="text-danger">*</span></label>
          <div class="check-radio-group">
            <label class="check-radio-label">
              <input type="radio" id="pickupYes" name="pickup" value="yes" required>
              Yes Please! - Pick me up on arrival
            </label>
            <label class="check-radio-label">
              <input type="radio" id="pickupNo" name="pickup" value="no">
              No Thanks - I'll make my own way there
            </label>
          </div>
        </div>
        <div>
          <label for="flightNum">Flight Number</label>
          <input type="text" id="flightNum" name="flightNum" placeholder="Enter flight number">
        </div>
      </div>

      <div class="mb-20">
        <label>Meals <span class="text-danger">*</span></label>
        <div class="check-radio-group row">
          <label class="check-radio-label"><input type="checkbox" name="meals" value="breakfast"> Breakfast</label>
          <label class="check-radio-label"><input type="checkbox" name="meals" value="lunch"> Lunch</label>
          <label class="check-radio-label"><input type="checkbox" name="meals" value="afternoon tea"> Afternoon tea</label>
          <label class="check-radio-label"><input type="checkbox" name="meals" value="dinner"> Dinner</label>
        </div>
      </div>

      <div class="mb-30">
        <label for="special">Special Requests</label>
        <textarea id="special" name="special" rows="4"></textarea>
      </div>

      <div class="text-center">
        <input type="submit" value="Submit Request" class="btn px-30">
      </div>

    </form>
  </main>
  <script src="../../../../header.js"></script>
</body>
</html>
