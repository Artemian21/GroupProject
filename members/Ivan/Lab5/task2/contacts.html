<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HolidayTime — Контакти</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hdr">
    <div class="hdr__logo">
      <img src="images/logo.png" alt="HolidayTime">
    </div>
    <nav class="hdr__nav">
      <a href="index.html" class="nav__link">ГОЛОВНА</a>
      <span class="nav__divider">|</span>
      <a href="about.html" class="nav__link">ПРО НАС</a>
      <span class="nav__divider">|</span>
      <a href="booking.html" class="nav__link">ЗАБРОНЮВАТИ</a>
      <span class="nav__divider">|</span>
      <a href="contacts.html" class="nav__link nav__link--active">КОНТАКТИ</a>
      <span class="nav__divider">|</span>
      <a href="profile.html" class="nav__link">ОСОБИСТИЙ КАБІНЕТ</a>
      <span class="nav__divider">|</span>
      <div class="lang-switcher">
        <img src="images/globe.svg" alt="Мова">
        <select class="lang-switcher__select">
          <option value="ua">UA</option>
          <option value="fr">FR</option>
          <option value="en">EN</option>
        </select>
      </div>
    </nav>
  </header>

  <section class="subheader">
    <h1 class="subheader__title"><em>Контакти</em></h1>
  </section>

  <main class="contacts-page">

    <section class="contacts-grid">

      <div class="contacts-row">
        <div class="contact-item">
          <h3 class="contact-item__label">Телефон</h3>
          <p class="contact-item__value">+38(097)119-89-83</p>
        </div>
        <div class="contact-item">
          <h3 class="contact-item__label">Графік роботи</h3>
          <p class="contact-item__value">пн-пт 08:00-22:00</p>
          <p class="contact-item__value">сб 09:00-21:00</p>
          <p class="contact-item__value">вс 10:00-20:00</p>
        </div>
        <div class="contact-item">
          <h3 class="contact-item__label">Ел. пошта</h3>
          <p class="contact-item__value">hello@gmail.com</p>
        </div>
      </div>

      <div class="address-row">
        <div class="contact-item">
          <h3 class="contact-item__label">Адреса офісу</h3>
          <p class="contact-item__value">м. Київ, вул. Малевича, буд. 4</p>
        </div>
        <div class="map-wrap">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2541.7125645211713!2d30.508627876254273!3d50.427826788992846!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40d4cf1e3ee89c35%3A0x9004f0857426acae!2z0LLRg9C70LjRhtGPINCa0LDQt9C40LzQuNGA0LAg0JzQsNC70LXQstC40YfQsCwgNCwg0JrQuNGX0LIsIDAyMDAw!5e0!3m2!1suk!2sua!4v1778358181892!5m2!1suk!2sua" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>

    </section>

  </main>

  <footer class="ftr">
    <p class="ftr__copy">© 2021 HolidayTime. All rights reserved.</p>
  </footer>

</body>
</html>
