<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Google - Андрій</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
    <div id="header-placeholder" data-root="../../../"></div>

    <main class="container google-page">
        
        <div style="display: flex; justify-content: flex-end; align-items: center; padding: 15px 20px;">
            <a href="#" class="g-link">Gmail</a>
            <a href="#" class="g-link">Зображення</a>
            <a href="#" class="g-link">Меню</a>
            <a href="#" class="btn-login">Увійти</a>
        </div>

        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            
            <h1 style="font-size: 5.5rem; margin-bottom: 20px; font-weight: 500; font-family: sans-serif; letter-spacing: -2px;">
                <span style="color: #4285F4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span>
            </h1>
            
            <form action="#" method="get" style="width: 100%; text-align: center;">
                <input type="text" name="q" placeholder="Пошук Google">
                
                <div style="margin-top: 25px;">
                    <input type="submit" value="Пошук Google">
                    <input type="submit" value="Мені пощастить">
                </div>
            </form>

            <div style="margin-top: 25px; font-size: 14px; color: #4d5156;">
                Google доступний такими мовами: 
                <a href="#" style="color: #1a0dab; text-decoration: none; padding: 0 5px;">Українська</a> | 
                <a href="#" style="color: #1a0dab; text-decoration: none; padding: 0 5px;">English</a> | 
                <a href="#" style="color: #1a0dab; text-decoration: none; padding: 0 5px;">Русский</a>
            </div>
        </div>

        <footer class="footer-box">
            <div style="text-align: center; padding: 15px 30px;">
                <a href="#" class="g-link">Про Google</a>
                <a href="#" class="g-link">Реклама</a>
                <a href="#" class="g-link">Для бізнесу</a>
                <a href="#" class="g-link">Конфіденційність</a>
                <a href="#" class="g-link">Умови</a>
            </div>
        </footer>
    </main>

    <script src="../../../header.js"></script>
</body>
</html>
