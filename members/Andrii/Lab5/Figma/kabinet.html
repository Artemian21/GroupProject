<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HolidayTime — Особистий кабінет</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-top">
    <div class="site-top__brand">
      <img src="images/logo.png" alt="HolidayTime">
    </div>
    <nav class="site-top__menu">
      <a href="index.html" class="menu__item">ГОЛОВНА</a>
      <span class="menu__sep">|</span>
      <a href="pro-nas.html" class="menu__item">ПРО НАС</a>
      <span class="menu__sep">|</span>
      <a href="bronjuvannya.html" class="menu__item">ЗАБРОНЮВАТИ</a>
      <span class="menu__sep">|</span>
      <a href="kontakty.html" class="menu__item">КОНТАКТИ</a>
      <span class="menu__sep">|</span>
      <a href="kabinet.html" class="menu__item menu__item--current">ОСОБИСТИЙ КАБІНЕТ</a>
      <span class="menu__sep">|</span>
      <div class="menu__lng">
        <img src="images/globe.svg" alt="Мова">
        <select class="menu__lng-sel">
          <option value="ua">UA</option>
          <option value="fr">FR</option>
          <option value="en">EN</option>
        </select>
      </div>
    </nav>
  </header>

  <section class="pg-banner">
    <h1 class="pg-banner__heading"><em>Особистий кабінет</em></h1>
  </section>

  <main class="profile-page">

    <section class="profile-card">

      <div class="profile-card__left">
        <div class="profile-card__avatar">
          <img src="images/avatar-placeholder.png" alt="Аватар користувача" class="profile-card__img">
        </div>
        <button class="profile-card__btn profile-card__btn--photo">Змінити аватар</button>
        <button class="profile-card__btn profile-card__btn--cfg">Налаштування</button>
      </div>

      <div class="profile-card__right">
        <h2 class="profile-card__name">Петров Іван Іванович</h2>
        <hr class="profile-card__hr">
        <p class="profile-card__row"><strong><em>Стать:</em></strong> <em>чоловіча</em></p>
        <hr class="profile-card__hr">
        <p class="profile-card__row"><strong><em>Дата народження:</em></strong> <em>10. 02. 1998</em></p>
        <hr class="profile-card__hr">
        <p class="profile-card__row"><strong><em>Мобільний телефон:</em></strong> +38(097)346-72-50</p>
        <hr class="profile-card__hr">
        <p class="profile-card__row"><strong><em>Ел. пошта:</em></strong> <em>petrov@gmail.com</em></p>
      </div>

    </section>

    <div class="profile-logout">
      <button class="logout-btn">Вийти</button>
    </div>

  </main>

  <footer class="site-bottom">
    <p class="site-bottom__text">© 2021 HolidayTime. All rights reserved.</p>
  </footer>

</body>
</html>
