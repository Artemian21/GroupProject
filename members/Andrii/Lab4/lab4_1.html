<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Календар</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>

<body>
    <header class="header">
        <div class="logo">Командний проєкт</div>
        <nav class="nav">
            <a href="../../../index.html">Головна</a>
        </nav>
    </header>

    <main class="container">
        <div class="lab-content static-calendar-page">
<div class="calendar-nav">
    <button id="prevMonth">← попередній місяць</button>
    <h1 id="monthTitle" class="text-center">January 2026</h1>
    <button id="nextMonth">наступний місяць →</button>
</div>

<table>
<thead>
<tr>
    <th>No.</th>
    <th>Sunday</th>
    <th>Monday</th>
    <th>Tuesday</th>
    <th>Wednesday</th>
    <th>Thursday</th>
    <th>Friday</th>
    <th>Saturday</th>
</tr>
</thead>
<tbody id="calendarBody"></tbody>
</table>
        </div>
    </main>
    <script>
        const monthTitle = document.getElementById("monthTitle");
        const calendarBody = document.getElementById("calendarBody");
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const holidays = new Set(["1-1", "1-6", "1-7", "1-14", "1-22", "1-27", "1-29"]);
        const specialDays = new Set(["1-25"]);
        let currentDate = new Date(2026, 0, 1);

        function renderCalendar() {
            calendarBody.innerHTML = "";
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthTitle.textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startOffset = firstDay.getDay();
            const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
            const date = new Date(year, month, 1 - startOffset);

            for (let rowIndex = 0; rowIndex < totalCells / 7; rowIndex++) {
                const row = document.createElement("tr");
                const numberCell = document.createElement("td");
                numberCell.textContent = rowIndex + 1;
                row.appendChild(numberCell);

                for (let dayIndex = 0; dayIndex < 7; dayIndex++) {
                    const cell = document.createElement("td");
                    const day = date.getDate();
                    const cellMonth = date.getMonth();
                    const key = `${cellMonth + 1}-${day}`;
                    cell.textContent = day;

                    if (cellMonth !== month) {
                        cell.classList.add("other-month");
                    } else {
                        if (dayIndex === 0 || dayIndex === 6) cell.classList.add("weekend");
                        if (holidays.has(key)) cell.classList.add("holiday");
                        if (specialDays.has(key)) cell.classList.add("special-day");
                    }

                    row.appendChild(cell);
                    date.setDate(date.getDate() + 1);
                }

                calendarBody.appendChild(row);
            }
        }

        document.getElementById("prevMonth").addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById("nextMonth").addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        renderCalendar();
    </script>
</body>
</html>
