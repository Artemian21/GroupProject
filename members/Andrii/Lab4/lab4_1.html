<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Календар</title>

<style>
table {
    border-collapse: collapse;
    width: 100%;
}

td, th {
    border: 1px solid black;
    padding: 10px;
    text-align: center;
    width: 40px;
    height: 40px;
    font-size: 20px;
}

/* Звичайні дні */
td {
    color: black;
}

/* Вихідні  */
td:nth-child(2),
td:nth-child(8) {
    color: green;
}

/* Сірі дні  */
tr:nth-child(2) td:nth-child(-n+5){
    color: gray;
}

/* Свята */
tr:nth-child(2) td:nth-child(6),  /* 1 */
tr:nth-child(3) td:nth-child(4),  /* 6 */
tr:nth-child(3) td:nth-child(5),  /* 6 */
tr:nth-child(4) td:nth-child(5),  /* 14 */
tr:nth-child(5) td:nth-child(6),  /* 22 */
tr:nth-child(6) td:nth-child(4),  /* 27 */
tr:nth-child(6) td:nth-child(6) { /* 29 */
    color: red;
    font-weight: bold;
}

/* День народження */
tr:nth-child(6) td:nth-child(2) {
    color: orange;
    font-weight: bold;
}
</style>
</head>

<body>

<h1 align="center">January 2026</h1>

<table>
<tr>
    <th>No.</th>
    <th>Sunday</th>
    <th>Monday</th>
    <th>Tuesday</th>
    <th>Wednesday</th>
    <th>Thursday</th>
    <th>Friday</th>
    <th>Saturday</th>
</tr>

<tr>
    <td>1</td>
    <td>28</td>
    <td>29</td>
    <td>30</td>
    <td>31</td>
    <td>1</td>
    <td>2</td>
    <td>3</td>
</tr>

<tr>
    <td>2</td>
    <td>4</td>
    <td>5</td>
    <td>6</td>
    <td>7</td>
    <td>8</td>
    <td>9</td>
    <td>10</td>
</tr>

<tr>
    <td>3</td>
    <td>11</td>
    <td>12</td>
    <td>13</td>
    <td>14</td>
    <td>15</td>
    <td>16</td>
    <td>17</td>
</tr>

<tr>
    <td>4</td>
    <td>18</td>
    <td>19</td>
    <td>20</td>
    <td>21</td>
    <td>22</td>
    <td>23</td>
    <td>24</td>
</tr>

<tr>
    <td>5</td>
    <td>25</td>
    <td>26</td>
    <td>27</td>
    <td>28</td>
    <td>29</td>
    <td>30</td>
    <td>31</td>
</tr>

</table>

</body>
</html>
